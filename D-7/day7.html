<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>DATA DIRI</legend>

            <label for="nama">Nama :</label>
            <input type="text" name="" id="nama" placeholder="Masukkan nama">
            <br>
            <br>
            <label for="email">Email :</label>
            <input type="email" name="" id="email" placeholder="Masukkan Email">
            <br>
            <br>
            <label for="password">Password :</label>
            <input type="password" name="" id="password" placeholder="Masukkan Password">
            <br>
            <br>
            <label for="kelamin">Jenis kelamin :</label>
            <input type="radio" name="Kelamin" id="">Pria
            <input type="radio" name="Kelamin" id="">Wanita
            <br>
            <br>
            <label for="hobi">Hobi</label>
            <input type="checkbox" name="" id="">Melukis
            <input type="checkbox" name="" id="">Bermain games
            <input type="checkbox" name="" id="">Basket
            <input type="checkbox" name="" id="">Badminton
            <input type="checkbox" name="" id="">Bola kaki
            <br>
            <br>
            <label for="kota">Kota asal :</label>
            <select name="" id="">
                <option value="">Medan</option>
                <option value="">Binjai</option>
                <option value="">Jakarta</option>
                <option value="">Yogyakarta</option>
                <option value="">Bandung</option>
            </select>
            <br>
            <br>
            <label for="alamat">Alamat : </label>
            <textarea name="" id="alamat" placeholder="masukkan alamat"></textarea>
            <br>
            <br>
            <label for="skill">Skill yg dimiliki :</label>
            <input list="skill">
            <datalist id="skill">
                <option value="HTML"></option>
                <option value="CSS"></option>
                <option value="PHP"></option>
            </datalist>
            <br>
            <br>
            <button type="submit">Submit</button>
        </fieldset>
    </form>
</body>
</html>
